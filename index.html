<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Ball — GenLayer Oracle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-accent: #c084fc;
    --text-gold: #e2c97e;
    --text-silver: #d0d0e0;
    --text-dim: #6b6880;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: var(--text-silver);
    font-family: 'Rajdhani', Arial, sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 8% 18%, rgba(255,255,255,0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 65%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 38% 12%, rgba(255,255,255,0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 52% 78%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 68% 38%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 83% 72%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 91% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 14% 88%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 76% 92%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(168,85,247,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 25%, rgba(168,85,247,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 58% 8%, rgba(255,255,255,0.35) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 14px 28px 0;
  }

  header .header-left { display: none; }

  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }

  .logo-svg-wrap {
    display: flex;
    margin-left: -155px;
    margin-top: 6px;
    width: clamp(370px, 56vw, 740px);
    justify-content: center;
  }

  .logo-svg-wrap svg {
    height: 28px;
    width: auto;
    display: block;
  }

  .logo-svg-wrap svg path,
  .logo-svg-wrap svg polygon {
    fill: #ffffff;
  }

  .magic-ball-title {
    width: clamp(370px, 56vw, 740px);
    line-height: 0;
    margin-left: -155px;
    margin-top: -20px;
  }

  /* Header right */
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 4px;
  }

  .faucet-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: transparent;
    border: 1px solid rgba(168,85,247,0.4);
    color: rgba(196,181,253,0.9);
    font-family: 'Rajdhani', Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.04em;
    padding: 7px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .faucet-btn:hover {
    background: rgba(168,85,247,0.12);
    border-color: var(--purple-accent);
  }
  .faucet-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--purple-accent);
    box-shadow: 0 0 8px var(--purple-accent);
  }

  .connect-btn {
    background: #8b5cf6;
    border: none;
    color: white;
    font-family: 'Rajdhani', Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 8px 22px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 0 22px rgba(139,92,246,0.5);
  }
  .connect-btn:hover {
    background: #7c3aed;
    box-shadow: 0 0 32px rgba(139,92,246,0.65);
    transform: translateY(-1px);
  }
  .connect-btn.connected {
    background: rgba(25,18,50,0.9);
    border: 1px solid rgba(168,85,247,0.45);
    box-shadow: none;
  }

  /* ── MAIN ── */
  main {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 20px 80px;
  }

  /* ── ORB ── */
  .orb-container {
    position: relative;
    width: clamp(260px, 42vw, 440px);
    height: clamp(260px, 42vw, 440px);
    margin-bottom: 44px;
    cursor: pointer;
  }

  /* Flat background glow under orb */
  .orb-container::before {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 110%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.08) 35%, rgba(255,255,255,0.02) 60%, transparent 75%);
    filter: blur(50px);
    border-radius: 50%;
    pointer-events: none;
    z-index: -1;
  }

  .orb-shadow {
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    width: 62%;
    height: 22px;
    background: radial-gradient(ellipse, rgba(60,60,60,0.7) 0%, transparent 70%);
    filter: blur(14px);
    animation: shadowPulse 4s ease-in-out infinite;
  }
  @keyframes shadowPulse {
    0%,100% { opacity: 0.7; transform: translateX(-50%) scaleX(1); }
    50% { opacity: 1; transform: translateX(-50%) scaleX(1.1); }
  }

  .orb {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 26%,
        rgba(160,160,160,1) 0%,
        rgba(80,80,80,1) 12%,
        rgba(30,30,30,1) 35%,
        rgba(10,10,10,1) 60%,
        rgba(2,2,2,1) 100%
      );
    box-shadow:
      inset -16px -16px 50px rgba(0,0,0,1),
      inset 18px 16px 32px rgba(200,200,200,0.12),
      0 0 60px rgba(0,0,0,0.8),
      0 28px 80px rgba(0,0,0,0.95);
    overflow: hidden;
    animation: orbFloat 5s ease-in-out infinite;
  }
  @keyframes orbFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  /* Pure white gloss streak — top left */
  .orb::before {
    content: '';
    position: absolute;
    top: 5%;
    left: 14%;
    width: 44%;
    height: 32%;
    background: radial-gradient(ellipse,
      rgba(255,255,255,0.55) 0%,
      rgba(255,255,255,0.22) 35%,
      rgba(255,255,255,0.05) 65%,
      transparent 100%
    );
    border-radius: 50%;
    transform: rotate(-20deg);
    filter: blur(2px);
  }

  /* removed - was causing blob */
  .orb::after {
    content: none;
  }

  /* Rim light — soft, barely visible bottom-right */
  .orb-reflex {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    box-shadow: inset -12px -12px 20px -12px rgba(180,180,180,0.12);
    filter: blur(2px);
    pointer-events: none;
  }

  .orb-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 58%;
    height: 58%;
    border-radius: 50%;
    border: 1.5px solid rgba(80,80,80,0.5);
    box-shadow:
      inset 0 0 50px rgba(0,0,0,0.95),
      0 0 10px rgba(0,0,0,0.6);
    background: radial-gradient(circle at 36% 30%,
      rgba(25,25,25,0.95),
      rgba(4,4,4,1)
    );
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Triangle — larger */
  .orb-triangle {
    position: relative;
    flex-shrink: 0;
    width: 0; height: 0;
    border-left: 62px solid transparent;
    border-right: 62px solid transparent;
    border-top: 108px solid rgba(65,35,155,0.92);
    filter: drop-shadow(0 0 18px rgba(139,92,246,0.8));
  }

  .triangle-text {
    position: absolute;
    top: 44%;
    left: 50%;
    transform: translate(-50%, -48%);
    text-align: center;
    font-family: 'Rajdhani', Arial, sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: rgba(215,195,255,0.95);
    line-height: 1.35;
    width: 86px;
    pointer-events: none;
    text-shadow: 0 0 12px rgba(139,92,246,1);
    word-break: break-word;
  }

  @keyframes shake {
    0%,100% { transform: rotate(0deg) translateY(0); }
    10% { transform: rotate(-5deg) translateY(-5px); }
    25% { transform: rotate(6deg) translateY(4px); }
    40% { transform: rotate(-6deg) translateY(-6px); }
    55% { transform: rotate(5deg) translateY(5px); }
    70% { transform: rotate(-4deg) translateY(-3px); }
    85% { transform: rotate(2deg) translateY(2px); }
  }
  @keyframes orbGlow {
    0%,100% { box-shadow: inset -16px -16px 50px rgba(0,0,0,1), inset 18px 16px 32px rgba(200,200,200,0.12), 0 0 60px rgba(0,0,0,0.8), 0 28px 80px rgba(0,0,0,0.95); }
    50% { box-shadow: inset -16px -16px 50px rgba(0,0,0,1), inset 18px 16px 32px rgba(220,220,220,0.2), 0 0 80px rgba(80,80,80,0.4), 0 28px 80px rgba(0,0,0,0.95); }
  }
  .orb.shaking {
    animation: shake 0.9s ease-in-out, orbGlow 0.9s ease-in-out;
  }

  /* ── VALIDATORS ── */
  .validators-status {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
    min-height: 22px;
    opacity: 0;
    transition: opacity 0.4s ease;
    font-family: 'Rajdhani', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--text-dim);
  }
  .validators-status.visible { opacity: 1; }
  .validator-dots { display: flex; gap: 5px; }
  .vdot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #2a2a35;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .vdot.active {
    background: var(--purple-accent);
    box-shadow: 0 0 8px var(--purple-accent);
    animation: dotPulse 0.65s ease-in-out infinite alternate;
  }
  @keyframes dotPulse { from { opacity: 0.5; } to { opacity: 1; } }

  /* ── INPUT ── */
  .input-section {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: -30px;
  }

  .input-label {
    font-family: 'Rajdhani', Arial, sans-serif;
    font-size: 14px;
    letter-spacing: 0.07em;
    color: rgba(200,200,225,0.85);
    transition: opacity 0.4s ease;
  }

  .input-wrapper { position: relative; width: 100%; }

  .question-input {
    width: 100%;
    background: rgba(18,12,40,0.75);
    border: 1px solid rgba(100,70,180,0.5);
    border-radius: 8px;
    padding: 13px 50px 13px 18px;
    color: var(--text-silver);
    font-family: 'Rajdhani', Arial, sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.3s ease;
    caret-color: var(--purple-accent);
  }
  .question-input::placeholder { color: rgba(107,104,128,0.65); }
  .question-input:focus {
    border-color: rgba(168,85,247,0.7);
    background: rgba(22,14,55,0.92);
    box-shadow: 0 0 0 3px rgba(107,33,168,0.18), 0 0 30px rgba(107,33,168,0.12);
  }

  .send-btn {
    position: absolute;
    right: 7px; top: 50%;
    transform: translateY(-50%);
    width: 36px; height: 36px;
    border-radius: 6px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
  }
  .send-btn:hover { box-shadow: 0 0 18px rgba(168,85,247,0.55); transform: translateY(-50%) scale(1.06); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .cost-hint {
    font-family: 'Rajdhani', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }
  .cost-hint span { color: var(--purple-accent); }

  /* ── TOAST ── */
  .answer-toast {
    position: fixed;
    bottom: 44px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(10,6,24,0.97);
    border: 1px solid rgba(168,85,247,0.45);
    border-radius: 12px;
    padding: 16px 32px;
    max-width: 460px;
    width: calc(100% - 40px);
    text-align: center;
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 200;
    box-shadow: 0 8px 40px rgba(0,0,0,0.9), 0 0 30px rgba(107,33,168,0.25);
    pointer-events: none;
  }
  .answer-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  .answer-label {
    font-family: 'Rajdhani', Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .answer-text {
    font-family: 'Rajdhani', Arial, sans-serif;
    font-size: clamp(15px, 2.5vw, 20px);
    font-weight: 600;
    color: var(--text-gold);
    line-height: 1.4;
    text-shadow: 0 0 20px rgba(226,201,126,0.45);
    letter-spacing: 0.04em;
  }

  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 10px 32px;
    display: flex;
    justify-content: center;
    gap: 28px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    z-index: 50;
  }
  footer a {
    font-family: 'Rajdhani', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }
  footer a:hover { color: var(--purple-accent); }

  .particle {
    position: fixed;
    width: 3px; height: 3px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 300;
    animation: particleFly 1.3s ease forwards;
  }
  @keyframes particleFly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0); }
  }
</style>
</head>

  <div class="header-left"></div>
  <div class="logo-block">
    <!-- GenLayer SVG logo, paths recolored white via CSS -->

        <path d="M106.14,46.33c0-13.83,8.72-22.96,22.42-22.96,11.51,0,19.01,6.2,19.76,15.19h-7.36c-1.29-5.38-5.31-8.45-9.2-8.45h-6.2c-6.34,0-11.99,7.15-11.99,16.08s5.79,15.94,12.54,15.94h4.57c5.04,0,8.99-3,10.63-6.2v-5.66h-10.97v-6.06h17.78v13.9c-2.73,5.31-8.86,10.77-19.62,10.77-13.56,0-22.35-8.31-22.35-22.55Z"/>

    </div>
    <div class="magic-ball-title">
      <svg width="100%" viewBox="0 0 700 160" xmlns="http://www.w3.org/2000/svg" style="display:block;">
        <defs>
          <linearGradient id="magicGradient" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#5a00ff"/>
            <stop offset="50%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#c4b5fd"/>
          </linearGradient>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <symbol id="star" viewBox="0 0 10 10">
            <polygon points="5,0 6,4 10,5 6,6 5,10 4,6 0,5 4,4" fill="white"/>
          </symbol>
        </defs>
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
              font-family="Rajdhani, Arial, sans-serif"
              font-weight="700" font-size="72"
              fill="url(#magicGradient)" filter="url(#glow)" letter-spacing="1.5">
          Magic Ball
        </text>
        <g filter="url(#glow)">
          <use href="#star" x="200" y="60" width="5" height="5"/>
          <use href="#star" x="220" y="75" width="4" height="4"/>
          <use href="#star" x="240" y="55" width="6" height="6"/>
          <use href="#star" x="260" y="70" width="4" height="4"/>
          <use href="#star" x="280" y="65" width="5" height="5"/>
          <use href="#star" x="300" y="50" width="4" height="4"/>
          <use href="#star" x="320" y="75" width="6" height="6"/>
          <use href="#star" x="340" y="60" width="5" height="5"/>
          <use href="#star" x="360" y="70" width="4" height="4"/>
          <use href="#star" x="380" y="55" width="6" height="6"/>
          <use href="#star" x="400" y="65" width="5" height="5"/>
          <use href="#star" x="420" y="75" width="4" height="4"/>
          <use href="#star" x="440" y="60" width="6" height="6"/>
          <use href="#star" x="460" y="70" width="5" height="5"/>
          <use href="#star" x="480" y="55" width="4" height="4"/>
          <use href="#star" x="500" y="65" width="6" height="6"/>
        </g>
      </svg>
    </div>
  </div>

  <div class="header-right">
    <button class="faucet-btn" onclick="openFaucet()">

      Faucet
